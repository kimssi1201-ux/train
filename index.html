<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>지하철 로케이션</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQK3p2ATbUXiOqMkpOun8i3Tf4phxDk="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css?v=cute-train-20260620" />
    <style>
      .app-internals[hidden] {
        display: none !important;
      }

      .control-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .train-map-icon {
        border: 0;
        background: transparent;
      }

      .map-train {
        position: relative;
        display: block;
        width: 44px;
        height: 48px;
        filter: drop-shadow(0 8px 12px rgba(20, 24, 32, 0.24));
      }

      .map-train-face {
        position: absolute;
        inset: 2px 3px 8px;
        display: block;
        border: 3px solid #fff;
        border-radius: 15px 15px 12px 12px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0) 38%),
          var(--train-color);
      }

      .map-train-face::after {
        position: absolute;
        right: 11px;
        bottom: 7px;
        left: 11px;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        content: "";
      }

      .map-train-window {
        position: absolute;
        top: 7px;
        right: 7px;
        left: 7px;
        height: 13px;
        border-radius: 6px 6px 4px 4px;
        background:
          linear-gradient(90deg, transparent calc(50% - 1px), rgba(20, 24, 32, 0.14) 0 calc(50% + 1px), transparent 0),
          #eaf8ff;
        box-shadow: inset 0 -2px 0 rgba(20, 24, 32, 0.08);
      }

      .map-train-lights {
        position: absolute;
        right: 8px;
        bottom: 10px;
        left: 8px;
        display: flex;
        justify-content: space-between;
      }

      .map-train-lights i {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #fff7c2;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.55);
      }

      .map-train::after {
        position: absolute;
        bottom: 2px;
        left: 50%;
        width: 22px;
        height: 8px;
        border-radius: 0 0 999px 999px;
        background: #fff;
        content: "";
        transform: translateX(-50%);
      }

      .map-train-badge {
        position: absolute;
        top: -2px;
        right: -2px;
        display: grid;
        min-width: 20px;
        height: 20px;
        padding: 0 5px;
        place-items: center;
        border: 2px solid #fff;
        border-radius: 999px;
        background: #111827;
        color: #fff;
        font-size: 11px;
        font-weight: 900;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <svg class="brand-logo" viewBox="0 0 64 64" aria-hidden="true">
            <path class="logo-pin" d="M32 4c-13.3 0-24 10.7-24 24 0 17.5 24 32 24 32s24-14.5 24-32C56 14.7 45.3 4 32 4Z" />
            <path class="logo-tunnel" d="M20 22c0-5.5 4.5-10 10-10h4c5.5 0 10 4.5 10 10v14c0 3.3-2.7 6-6 6H26c-3.3 0-6-2.7-6-6V22Z" />
            <path class="logo-window" d="M24 23c0-3.3 2.7-6 6-6h4c3.3 0 6 2.7 6 6v5H24v-5Z" />
            <path class="logo-track" d="M25 47h14M29 42l-5 8M35 42l5 8" />
            <circle class="logo-light" cx="26" cy="35" r="2.2" />
            <circle class="logo-light" cx="38" cy="35" r="2.2" />
          </svg>
          <div>
            <h1>지하철 로케이션</h1>
            <p id="statusText">실시간 위치 불러오는 중</p>
          </div>
        </div>
        <button class="icon-button" id="refreshButton" type="button" title="새로고침" aria-label="새로고침">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 0 1-15.4 6.4M3 12A9 9 0 0 1 18.4 5.6" />
            <path d="M21 4v6h-6M3 20v-6h6" />
          </svg>
        </button>
      </header>

      <main>
        <section class="control-band" aria-label="검색과 필터">
          <div class="line-tabs" id="lineTabs"></div>
          <div class="control-grid">
            <label class="field">
              <span>검색</span>
              <input id="searchInput" type="search" placeholder="역명, 행선지, 열차번호" autocomplete="off" />
            </label>
            <div class="app-internals" hidden aria-hidden="true">
              <label>
                <span>API 인증키</span>
                <input id="apiKeyInput" type="password" placeholder="sample" autocomplete="off" />
              </label>
              <button id="saveKeyButton" type="button">저장</button>
              <label>
                <input id="autoRefresh" type="checkbox" checked />
                <span></span>
                <strong>자동</strong>
              </label>
            </div>
          </div>
        </section>

        <section class="metric-grid app-internals" hidden aria-hidden="true">
          <article>
            <span>표시 열차</span>
            <strong id="visibleCount">0</strong>
          </article>
          <article>
            <span>지원 노선</span>
            <strong id="lineCount">0</strong>
          </article>
          <article>
            <span>기준 시각</span>
            <strong id="updatedAt">-</strong>
          </article>
          <article>
            <span>데이터</span>
            <strong id="dataMode">sample</strong>
          </article>
        </section>

        <section class="board-section map-section" aria-label="지도 위치">
          <div class="section-heading">
            <div>
              <h2>지도</h2>
              <p id="mapSummary">역 좌표 불러오는 중</p>
            </div>
            <button class="text-button" id="fitMapButton" type="button">맞춤</button>
          </div>
          <div class="map-canvas" id="mapCanvas"></div>
        </section>

        <section class="board-section" aria-label="노선별 위치">
          <div class="section-heading">
            <div>
              <h2>노선 위치</h2>
              <p id="lineSummary">전체 노선</p>
            </div>
            <select id="sortSelect" aria-label="정렬">
              <option value="line">노선순</option>
              <option value="station">역순</option>
              <option value="time">최신순</option>
              <option value="status">상태순</option>
            </select>
          </div>
          <div class="track-board" id="trackBoard"></div>
        </section>

      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      if (location.protocol === "https:") {
        const originalFetch = window.fetch.bind(window);
        window.fetch = (input, init) => {
          const url = typeof input === "string" ? input : input?.url;
          if (url?.startsWith("http://swopenapi.seoul.go.kr/api/subway/")) {
            const proxied = url.replace("http://swopenapi.seoul.go.kr/api/subway", "/api/subway");
            return originalFetch(proxied, init);
          }
          return originalFetch(input, init);
        };
      }

      if (window.L && !window.L.__cuteTrainMarkerPatched) {
        const originalCircleMarker = window.L.circleMarker.bind(window.L);
        const inferTrainCount = (radius) => Math.max(1, Math.round((Number(radius || 8) - 8) / 1.3));
        const cuteTrainIcon = (color, count) =>
          window.L.divIcon({
            className: "train-map-icon",
            html: `
              <span class="map-train" style="--train-color:${color}">
                <span class="map-train-face" aria-hidden="true">
                  <span class="map-train-window"></span>
                  <span class="map-train-lights"><i></i><i></i></span>
                </span>
                ${count > 1 ? `<span class="map-train-badge">${count}</span>` : ""}
              </span>
            `,
            iconSize: [44, 48],
            iconAnchor: [22, 42],
            popupAnchor: [0, -36],
          });

        window.L.circleMarker = (latlng, options = {}) => {
          const isTrainMarker = options.fillOpacity === 0.78 && options.weight === 3;
          if (!isTrainMarker) return originalCircleMarker(latlng, options);

          return window.L.marker(latlng, {
            icon: cuteTrainIcon(options.fillColor || options.color || "#141820", inferTrainCount(options.radius)),
            zIndexOffset: 100,
          });
        };
        window.L.__cuteTrainMarkerPatched = true;
      }
    </script>
    <script src="./app.js?v=cute-train-20260620"></script>
  </body>
</html>
