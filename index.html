<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>지하철 로케이션</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQK3p2ATbUXiOqMkpOun8i3Tf4phxDk="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css?v=api-throttle-20260621" />
    <style>
      .app-internals[hidden] {
        display: none !important;
      }

      .control-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .train-map-icon {
        border: 0;
        background: transparent;
      }

      .map-train {
        position: relative;
        display: grid;
        width: 64px;
        height: 62px;
        justify-items: center;
        filter: drop-shadow(0 8px 12px rgba(20, 24, 32, 0.24));
      }

      .map-train::before {
        position: absolute;
        top: 31px;
        left: 50%;
        width: 12px;
        height: 12px;
        border-right: 3px solid #fff;
        border-bottom: 3px solid #fff;
        background: var(--train-color);
        content: "";
        transform: translateX(-50%) rotate(45deg);
      }

      .map-train-symbol {
        position: relative;
        z-index: 1;
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border: 3px solid #fff;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0) 50%),
          var(--train-color);
        box-shadow: 0 4px 10px rgba(20, 24, 32, 0.18);
      }

      .map-train-symbol svg {
        width: 25px;
        height: 25px;
        fill: none;
        stroke: #fff;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 1.9;
      }

      .map-train-badge {
        position: absolute;
        top: -2px;
        right: 6px;
        display: grid;
        min-width: 20px;
        height: 20px;
        padding: 0 5px;
        place-items: center;
        border: 2px solid #fff;
        border-radius: 999px;
        background: #111827;
        color: #fff;
        font-size: 11px;
        font-weight: 900;
        line-height: 1;
      }

      .map-train-status {
        position: absolute;
        bottom: 1px;
        left: 50%;
        z-index: 2;
        display: grid;
        min-width: 38px;
        height: 21px;
        padding: 0 7px;
        place-items: center;
        border: 2px solid #fff;
        border-radius: 999px;
        background: #eef2f6;
        color: #344054;
        font-size: 11px;
        font-weight: 900;
        line-height: 1;
        white-space: nowrap;
        transform: translateX(-50%);
      }

      .map-train.status-arrive .map-train-status,
      .status-chip.status-arrive {
        background: #dcfce7;
        color: #166534;
      }

      .map-train.status-depart .map-train-status,
      .status-chip.status-depart {
        background: #e0f2fe;
        color: #075985;
      }

      .map-train.status-enter .map-train-status,
      .status-chip.status-enter {
        background: #fef3c7;
        color: #92400e;
      }

      .status-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 7px;
      }

      .status-chip {
        display: inline-grid;
        min-height: 22px;
        padding: 0 8px;
        place-items: center;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <svg class="brand-logo" viewBox="0 0 64 64" aria-hidden="true">
            <path class="logo-pin" d="M32 4c-13.3 0-24 10.7-24 24 0 17.5 24 32 24 32s24-14.5 24-32C56 14.7 45.3 4 32 4Z" />
            <path class="logo-tunnel" d="M20 22c0-5.5 4.5-10 10-10h4c5.5 0 10 4.5 10 10v14c0 3.3-2.7 6-6 6H26c-3.3 0-6-2.7-6-6V22Z" />
            <path class="logo-window" d="M24 23c0-3.3 2.7-6 6-6h4c3.3 0 6 2.7 6 6v5H24v-5Z" />
            <path class="logo-track" d="M25 47h14M29 42l-5 8M35 42l5 8" />
            <circle class="logo-light" cx="26" cy="35" r="2.2" />
            <circle class="logo-light" cx="38" cy="35" r="2.2" />
          </svg>
          <div>
            <h1>지하철 로케이션</h1>
            <p id="statusText">실시간 위치 불러오는 중</p>
          </div>
        </div>
        <button class="icon-button" id="refreshButton" type="button" title="새로고침" aria-label="새로고침">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 0 1-15.4 6.4M3 12A9 9 0 0 1 18.4 5.6" />
            <path d="M21 4v6h-6M3 20v-6h6" />
          </svg>
        </button>
      </header>

      <main>
        <section class="control-band" aria-label="검색과 필터">
          <div class="line-tabs" id="lineTabs"></div>
          <div class="control-grid">
            <label class="field">
              <span>검색</span>
              <input id="searchInput" type="search" placeholder="역명, 행선지, 열차번호" autocomplete="off" />
            </label>
            <div class="app-internals" hidden aria-hidden="true">
              <label>
                <span>API 인증키</span>
                <input id="apiKeyInput" type="password" placeholder="sample" autocomplete="off" />
              </label>
              <button id="saveKeyButton" type="button">저장</button>
              <label>
                <input id="autoRefresh" type="checkbox" checked />
                <span></span>
                <strong>자동</strong>
              </label>
            </div>
          </div>
        </section>

        <section class="metric-grid app-internals" hidden aria-hidden="true">
          <article>
            <span>표시 열차</span>
            <strong id="visibleCount">0</strong>
          </article>
          <article>
            <span>지원 노선</span>
            <strong id="lineCount">0</strong>
          </article>
          <article>
            <span>기준 시각</span>
            <strong id="updatedAt">-</strong>
          </article>
          <article>
            <span>데이터</span>
            <strong id="dataMode">sample</strong>
          </article>
        </section>

        <section class="board-section map-section" aria-label="지도 위치">
          <div class="section-heading">
            <div>
              <h2>지도</h2>
              <p id="mapSummary">역 좌표 불러오는 중</p>
              <div class="status-legend" aria-label="열차 상태">
                <span class="status-chip status-arrive">정차</span>
                <span class="status-chip status-depart">출발</span>
                <span class="status-chip status-enter">진입</span>
              </div>
            </div>
            <button class="text-button" id="fitMapButton" type="button">맞춤</button>
          </div>
          <div class="map-canvas" id="mapCanvas"></div>
        </section>

        <section class="board-section" aria-label="노선별 위치">
          <div class="section-heading">
            <div>
              <h2>노선 위치</h2>
              <p id="lineSummary">전체 노선</p>
            </div>
            <select id="sortSelect" aria-label="정렬">
              <option value="line">노선순</option>
              <option value="station">역순</option>
              <option value="time">최신순</option>
              <option value="status">상태순</option>
            </select>
          </div>
          <div class="track-board" id="trackBoard"></div>
        </section>

      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      if (location.protocol === "https:") {
        const originalFetch = window.fetch.bind(window);
        const liveCacheKey = "metro-live-fetch-cache-v1";
        const dailyKey = "metro-live-api-daily-budget";
        const liveCacheMs = 15 * 60 * 1000;
        const dailyBudget = 850;

        const todayKey = () => new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Seoul" }).format(new Date());
        const readJson = (key, fallback) => {
          try {
            return JSON.parse(localStorage.getItem(key) || "null") || fallback;
          } catch (error) {
            return fallback;
          }
        };
        const writeJson = (key, value) => {
          try {
            localStorage.setItem(key, JSON.stringify(value));
          } catch (error) {}
        };
        const emptySubwayResponse = () =>
          new Response(
            JSON.stringify({
              errorMessage: { code: "INFO-200", message: "API 호출 보호로 빈 응답을 표시합니다.", total: 0 },
              realtimePositionList: [],
            }),
            { headers: { "Content-Type": "application/json; charset=utf-8", "X-Subway-Guard": "BYPASS" } },
          );
        const canCallApi = () => {
          const date = todayKey();
          const usage = readJson(dailyKey, { date, count: 0 });
          const normalizedUsage = usage.date === date ? usage : { date, count: 0 };
          return normalizedUsage.count < dailyBudget;
        };
        const recordApiCall = () => {
          const date = todayKey();
          const usage = readJson(dailyKey, { date, count: 0 });
          const normalizedUsage = usage.date === date ? usage : { date, count: 0 };
          normalizedUsage.count += 1;
          writeJson(dailyKey, normalizedUsage);
        };
        const guardedSubwayFetch = async (url, init) => {
          const cache = readJson(liveCacheKey, {});
          const cached = cache[url];
          if (cached && Date.now() - cached.savedAt < liveCacheMs) {
            return new Response(cached.body, {
              status: cached.status || 200,
              headers: { "Content-Type": "application/json; charset=utf-8", "X-Subway-Guard": "HIT" },
            });
          }
          if (!canCallApi()) return emptySubwayResponse();

          recordApiCall();
          const response = await originalFetch(url, init);
          if (response.ok) {
            response
              .clone()
              .text()
              .then((body) => {
                cache[url] = { savedAt: Date.now(), status: response.status, body };
                writeJson(liveCacheKey, cache);
              })
              .catch(() => {});
          }
          return response;
        };

        window.fetch = (input, init) => {
          const url = typeof input === "string" ? input : input?.url;
          if (url?.startsWith("http://swopenapi.seoul.go.kr/api/subway/")) {
            const proxied = url.replace("http://swopenapi.seoul.go.kr/api/subway", "/api/subway");
            return guardedSubwayFetch(proxied, init);
          }
          if (url?.startsWith("/api/subway/") && url.includes("/realtimePosition/")) {
            return guardedSubwayFetch(url, init);
          }
          return originalFetch(input, init);
        };
      }

      if (window.L && !window.L.__cuteTrainMarkerPatched) {
        const originalCircleMarker = window.L.circleMarker.bind(window.L);
        const inferTrainCount = (radius) => Math.max(1, Math.round((Number(radius || 8) - 8) / 1.3));
        const inferStatusIndex = (content) => {
          const text = String(content || "");
          if (text.includes("출발")) return 2;
          if (text.includes("진입")) return 0;
          if (text.includes("도착") || text.includes("정차")) return 1;
          return 1;
        };
        const statusLabels = ["진입", "정차", "출발", "전역출발"];
        const statusClasses = ["status-enter", "status-arrive", "status-depart", "status-depart"];
        const cuteTrainIcon = (color, count, statusIndex = 1) =>
          window.L.divIcon({
            className: "train-map-icon",
            html: `
              <span class="map-train ${statusClasses[statusIndex] || ""}" style="--train-color:${color}">
                <span class="map-train-symbol" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M7 4h10a3 3 0 0 1 3 3v7a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V7a3 3 0 0 1 3-3Z" />
                    <path d="M7 8h10v5H7z" />
                    <path d="M8 21l2-3M16 18l2 3" />
                    <circle cx="8.5" cy="15.5" r="1.1" />
                    <circle cx="15.5" cy="15.5" r="1.1" />
                  </svg>
                </span>
                ${count > 1 ? `<span class="map-train-badge">${count}</span>` : ""}
                <span class="map-train-status">${statusLabels[statusIndex] || "상태"}</span>
              </span>
            `,
            iconSize: [64, 62],
            iconAnchor: [32, 50],
            popupAnchor: [0, -48],
          });

        window.L.circleMarker = (latlng, options = {}) => {
          const isTrainMarker = options.fillOpacity === 0.78 && options.weight === 3;
          if (!isTrainMarker) return originalCircleMarker(latlng, options);
          const color = options.fillColor || options.color || "#141820";
          const count = inferTrainCount(options.radius);
          const marker = window.L.marker(latlng, {
            icon: cuteTrainIcon(color, count, 1),
            zIndexOffset: 100,
          });
          const originalBindPopup = marker.bindPopup.bind(marker);
          marker.bindPopup = (content, bindOptions) => {
            marker.setIcon(cuteTrainIcon(color, count, inferStatusIndex(content)));
            return originalBindPopup(content, bindOptions);
          };

          return marker;
        };
        window.L.__cuteTrainMarkerPatched = true;
      }
    </script>
    <script src="./app.js?v=api-throttle-20260621"></script>
  </body>
</html>
